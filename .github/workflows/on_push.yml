name: Push handler

on:
  push:

jobs:
  firmware_pipeline:
    name: Build Firmware
    permissions:
      packages: write
      contents: read
    uses: ./.github/workflows/build_firmware.yml
  client_pipeline:
    name: Build Firmware
    uses: ./.github/workflows/build_client.yml
  create_dev_release:
    permissions:
      contents: write
    name: Create dev pre-release with artifacts
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs:
      - firmware_pipeline
      - client_pipeline
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-artifacts-*
          merge-multiple: true
          path: release-artifacts
      - name: Upload to dev release
        uses: softprops/action-gh-release@v1
        with:
          body: |
            Auto-Generated DFU packages from latest `main` commit.
            For development purposes only. 
            These are not tested, here be dragons.
            Built from commit ${{ github.sha }}
          tag_name: dev
          name: Development release
          draft: false
          prerelease: true
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: release-artifacts/*
      - name: Fix up release tag
        run: |
          git tag -f dev
          git push --tags -f
  create_release:
    permissions:
      contents: write
    name: Create tagged release with artifacts
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - firmware_pipeline
      - client_pipeline
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-artifacts-*
          merge-multiple: true
          path: release-artifacts
      - name: Upload to tagged release
        uses: softprops/action-gh-release@v1
        with:
          body: |
            Auto-Generated DFU packages for Release ${{ github.ref_name }}
            Built from commit ${{ github.sha }}
          name: Release ${{ github.ref_name }}
          draft: false
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          append_body: true
          files: release-artifacts/*
  update_formula:
    permissions:
      contents: write
    name: Update Homebrew formula
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - create_release
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Update formula tag and revision
        run: |
          TAG="${GITHUB_REF_NAME}"
          REVISION="${GITHUB_SHA}"
          sed -i "s|tag:.*|tag:      \"${TAG}\",|" Formula/chameleon-ultra-cli.rb
          sed -i "s|revision:.*|revision: \"${REVISION}\"|" Formula/chameleon-ultra-cli.rb
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/chameleon-ultra-cli.rb
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "formula: update chameleon-ultra-cli to ${GITHUB_REF_NAME}"
          git push origin main
